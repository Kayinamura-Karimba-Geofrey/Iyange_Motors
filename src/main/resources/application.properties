# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/iyange_motors
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server Configuration
server.port=8080

# JWT Secrets (For dev purposes, should be in env vars in prod)
iyangemotors.app.jwtSecret=SecretKeyForGenJWTsIyangeMotorsProject2026ModernWebBackendSecurity
iyangemotors.app.jwtExpirationMs=86400000
